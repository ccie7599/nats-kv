apiVersion: apps/v1
kind: Deployment
metadata:
  name: kv-adapter
  namespace: demo-nats-kv
  labels:
    app: kv-adapter
    project: nats-kv
spec:
  replicas: 1
  strategy:
    type: Recreate    # JetStream requires single writer to PVC
  selector:
    matchLabels:
      app: kv-adapter
  template:
    metadata:
      labels:
        app: kv-adapter
        project: nats-kv
      annotations:
        # OTel pipeline picks /metrics off this pod and ships through gateway → Prometheus
        prometheus.io/scrape: "true"
        prometheus.io/port: "8222"
        prometheus.io/path: "/varz"
        # Vault Agent injector — renders /vault/secrets/demo-token from api/nats-kv/config
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "api"
        vault.hashicorp.com/agent-inject-secret-demo-token: "api/data/nats-kv/config"
        vault.hashicorp.com/agent-inject-template-demo-token: |
          {{- with secret "api/data/nats-kv/config" -}}
          {{ .Data.data.demo_token }}
          {{- end -}}
    spec:
      serviceAccountName: app-vault-access
      imagePullSecrets:
        - name: harbor-creds
      # Read DEMO_TOKEN from Vault-injected file at startup
      containers:
        - name: adapter
          image: harbor.harbor.svc.cluster.local/presales/nats-kv-adapter:v0.2.4
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              export DEMO_TOKEN="$(cat /vault/secrets/demo-token)"
              exec /usr/local/bin/kv-adapter
          env:
            - name: REGION
              value: "us-ord"
            - name: LISTEN_ADDR
              value: ":8080"
            - name: JETSTREAM_DIR
              value: "/var/lib/nats/jetstream"
            # NATS standard ports — LZ pod is on cluster-internal network so no
            # collision with the latency-hub on hostNetwork. Leaf KV nodes are
            # dedicated (`tier=kv` taint) so also free of the latency 4222/6222.
            - name: NATS_CLIENT_PORT
              value: "4222"
            - name: NATS_CLUSTER_PORT
              value: "6222"
            - name: NATS_MONITOR_PORT
              value: "8222"
            # Self-route satisfies JetStream's "must be part of a cluster" boot check.
            # Leaves gossip-discover other peers via this seed.
            - name: NATS_ROUTES
              value: "nats-route://us-ord.nats-kv.connected-cloud.io:6222"
            # Leaves dial us-ord.nats-kv.connected-cloud.io (NB IP). The LZ pod's
            # default cluster_advertise is its pod IP (10.2.0.x) which leaves can't
            # reach and which collides with the latency-mesh NATS in some clusters.
            # Force advertise of the NB IP so gossip works.
            - name: CLUSTER_ADVERTISE
              value: "us-ord.nats-kv.connected-cloud.io:6222"
            # TLS — wildcard cert from cert-manager
            - name: LISTEN_TLS_ADDR
              value: ":8443"
            - name: TLS_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/tls/tls.key"
          ports:
            - name: http
              containerPort: 8080
            - name: https
              containerPort: 8443
            - name: nats-client
              containerPort: 4222
            - name: nats-cluster
              containerPort: 6222
            - name: nats-monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1Gi
          volumeMounts:
            - name: jetstream
              mountPath: /var/lib/nats/jetstream
            - name: tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: jetstream
          persistentVolumeClaim:
            claimName: jetstream-data
        - name: tls
          secret:
            secretName: nats-kv-tls
