apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-data
  namespace: demo-nats-kv
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: linode-block-storage-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kv-control
  namespace: demo-nats-kv
  labels:
    app: kv-control
    project: nats-kv
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: kv-control }
  template:
    metadata:
      labels: { app: kv-control, project: nats-kv }
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "api"
        vault.hashicorp.com/agent-inject-secret-admin-token: "api/data/nats-kv/control"
        vault.hashicorp.com/agent-inject-template-admin-token: |
          {{- with secret "api/data/nats-kv/control" -}}
          {{ .Data.data.admin_token }}
          {{- end -}}
    spec:
      serviceAccountName: app-vault-access
      imagePullSecrets:
        - name: harbor-creds
      containers:
        - name: control
          image: harbor.harbor.svc.cluster.local/presales/nats-kv-control:v0.1.16
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              export ADMIN_TOKEN="$(cat /vault/secrets/admin-token)"
              exec /usr/local/bin/kv-control
          env:
            - { name: LISTEN_ADDR,     value: ":8088" }
            - { name: LISTEN_TLS_ADDR, value: ":8443" }
            - { name: TLS_CERT_FILE,   value: "/etc/tls/tls.crt" }
            - { name: TLS_KEY_FILE,    value: "/etc/tls/tls.key" }
            - { name: NATS_URL,        value: "nats://kv-adapter.demo-nats-kv.svc.cluster.local:4222" }
            - { name: DB_PATH,         value: "/var/lib/nats-kv-control/control.db" }
            - { name: PUBLIC_BASE_URL, value: "https://3c5be533-8e6d-423b-9962-87d9da8d16cd.fwf.app" }
            # Placement engine — pulls live RTT matrix from project-latency hub.
            # TODO: move LATENCY_AUTH_TOKEN to Vault (api/data/nats-kv/control) before any production posture.
            # latency-demo (Akamai-fronted) is reachable from inside LZ; the
            # direct-to-origin latency.connected-cloud.io has firewall rules
            # that block our LZ NAT egress IP.
            - { name: LATENCY_HUB_URL, value: "https://latency-demo.connected-cloud.io" }
            - { name: LATENCY_AUTH_TOKEN, value: "f77702e5b9277f608abd30707239e1f9" }
          ports:
            - { name: http,  containerPort: 8088 }
            - { name: https, containerPort: 8443 }
          readinessProbe:
            httpGet: { path: /v1/health, port: 8088 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v1/health, port: 8088 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /var/lib/nats-kv-control }
            - { name: tls,  mountPath: /etc/tls, readOnly: true }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: control-data
        - name: tls
          secret:
            secretName: nats-kv-tls
---
apiVersion: v1
kind: Service
metadata:
  name: kv-control
  namespace: demo-nats-kv
spec:
  type: ClusterIP
  selector: { app: kv-control }
  ports:
    - { name: http, port: 8088, targetPort: 8088 }
---
apiVersion: v1
kind: Service
metadata:
  name: kv-control-external
  namespace: demo-nats-kv
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "0"
spec:
  type: LoadBalancer
  selector: { app: kv-control }
  ports:
    - { name: https, port: 443, targetPort: 8443, protocol: TCP }
