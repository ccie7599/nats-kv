apiVersion: v1
kind: Service
metadata:
  name: kv-adapter
  namespace: demo-nats-kv
spec:
  type: ClusterIP
  selector:
    app: kv-adapter
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: nats-client
      port: 4232
      targetPort: 4232
    - name: nats-cluster
      port: 6232
      targetPort: 6232
    - name: nats-monitor
      port: 8232
      targetPort: 8232
---
# External LoadBalancer (NodeBalancer) for the LZ (us-ord) cluster.
# Leaves use hostNetwork+hostPort directly (one node per leaf). This NB carries
# both the HTTP API (port 80) and the NATS cluster mesh ingress (port 6232) so
# leaves can dial back into us-ord as a seed.
apiVersion: v1
kind: Service
metadata:
  name: kv-adapter-external
  namespace: demo-nats-kv
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "0"
spec:
  type: LoadBalancer
  selector:
    app: kv-adapter
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: nats-cluster
      port: 6232
      targetPort: 6232
      protocol: TCP
