apiVersion: v1
kind: Service
metadata:
  name: kv-adapter
  namespace: demo-nats-kv
spec:
  type: ClusterIP
  selector:
    app: kv-adapter
  ports:
    - { name: http,         port: 8080, targetPort: 8080 }
    - { name: https,        port: 8443, targetPort: 8443 }
    - { name: nats-client,  port: 4222, targetPort: 4222 }
    - { name: nats-cluster, port: 6222, targetPort: 6222 }
    - { name: nats-monitor, port: 8222, targetPort: 8222 }
---
# External LoadBalancer for the LZ. Leaves use hostNetwork on dedicated KV nodes
# directly. NB carries the HTTP API (80→8080), HTTPS (443→8443), and the NATS
# cluster mesh ingress (6222) so leaves can dial back into us-ord as a seed.
apiVersion: v1
kind: Service
metadata:
  name: kv-adapter-external
  namespace: demo-nats-kv
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "0"
spec:
  type: LoadBalancer
  selector:
    app: kv-adapter
  ports:
    - { name: http,         port: 80,   targetPort: 8080, protocol: TCP }
    - { name: http-alt,     port: 8080, targetPort: 8080, protocol: TCP }
    - { name: https,        port: 443,  targetPort: 8443, protocol: TCP }
    - { name: nats-cluster, port: 6222, targetPort: 6222, protocol: TCP }
