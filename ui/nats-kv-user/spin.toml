#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "nats-kv-user"
version = "0.1.0"
authors = ["ccie7599 <brian@apley.net>"]
description = "NATS KV demo UI"

# Gate token for the UI itself (separate from KV bearer keys).
# Visitors land on a "request invite" page; admins share a `?access=<token>`
# URL with vetted users to unlock the full UI. Token is set via
# `spin aka variables set ui_gate_token=<value>`.
[variables]
ui_gate_token = { default = "demo-open-2026" }

[[trigger.http]]
route = "/..."
component = "nats-kv-user"

[component.nats-kv-user]
source = "target/wasm32-wasip1/release/nats_kv_user.wasm"
allowed_outbound_hosts = [
  "https://*.connected-cloud.io",
  "https://*.nats-kv.connected-cloud.io",
  "http://*.nats-kv.connected-cloud.io:8080",
  "http://edge.nats-kv.connected-cloud.io:8080",
  "http://172.237.141.164",
  "https://ipinfo.io",
]
key_value_stores = ["default"]
[component.nats-kv-user.variables]
ui_gate_token = "{{ ui_gate_token }}"
[component.nats-kv-user.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
